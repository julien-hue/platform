<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audion's Briefing Agent Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #121212; 
            color: #ffffff;
            background-image: url("https://www.transparenttextures.com/patterns/topography.png");
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .tab-active { 
            background-color: #c5866f !important; 
            color: white !important;
            border: none !important;
        }
        .original-box {
            border: 1px dashed rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.02);
        }
        .enriched-table {
            border: 1px solid rgba(255,255,255,0.5);
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c5866f; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="w-full max-w-[98%] mx-auto space-y-12">
        
        <!-- Section d'en-tête -->
        <div class="text-center space-y-4">
            <div class="inline-block px-6 py-1 border border-white rounded-lg text-sm font-bold tracking-widest uppercase mb-4">
                Audion AI
            </div>
            <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter glow-text leading-none">
                Audion's Briefing Agent Synthesis
            </h1>
        </div>

        <!-- Onglets de Navigation -->
        <div id="tabs-container" class="flex flex-wrap gap-3 justify-center">
            <!-- Injecté par JavaScript -->
        </div>

        <!-- Grille de Contenu Principal -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Colonne de gauche : BRIEF ORIGINAL -->
            <div class="lg:col-span-4 space-y-4">
                <div class="text-center py-2 border border-white/30 rounded-t-lg bg-white/5 uppercase text-xs font-black tracking-widest">
                    Original Brief
                </div>
                <div id="original-brief" class="original-box p-8 rounded-b-lg space-y-8 text-sm leading-relaxed text-gray-300 min-h-[600px] custom-scrollbar overflow-y-auto">
                    <!-- Injecté par JavaScript -->
                </div>
            </div>

            <!-- Diviseur Flèche (Desktop) -->
            <div class="hidden lg:flex lg:col-span-1 h-full items-center justify-center opacity-20">
                <svg width="60" height="40" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 20H50M50 20L35 5M50 20L35 35" stroke="white" stroke-width="4"/>
                    <path d="M15 20L5 10M15 20L5 30" stroke="white" stroke-width="2"/>
                </svg>
            </div>

            <!-- Colonne de droite : BRIEF ENRICHI -->
            <div class="lg:col-span-7 space-y-4">
                <div class="text-center py-3 bg-[#c5866f] rounded-t-lg uppercase text-sm font-black tracking-widest text-white shadow-lg">
                    Audion AI Enriched Brief
                </div>
                
                <div class="space-y-0">
                    <!-- Table du haut : Persona & Sociologie -->
                    <div class="grid grid-cols-2 enriched-table bg-white/5">
                        <div id="persona-left" class="p-6 border-r border-white/30 space-y-4">
                            <!-- Injecté par JavaScript -->
                        </div>
                        <div id="persona-right" class="p-6 space-y-4 text-gray-300 text-sm">
                            <!-- Injecté par JavaScript -->
                        </div>
                    </div>

                    <!-- Bloc du bas : YAML & Données Techniques -->
                    <div id="yaml-content" class="enriched-table border-t-0 p-8 mono text-xs leading-relaxed text-[#c5866f]">
                        <!-- Injecté par JavaScript -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Logo de bas de page -->
    <div class="fixed bottom-8 right-8 opacity-50">
        <span class="text-2xl font-black tracking-tighter">Audion</span>
    </div>

    <script>
        const briefs = [
            {
                id: 'subway',
                brand: 'SUBWAY',
                original: `
                    <p><strong>Marque :</strong> Subway</p>
                    <p><strong>Cible :</strong> Jeunes de 18 à 34 ans qui aiment les bonnes affaires et mangent souvent au restaurant.</p>
                    <p><strong>Objectif :</strong> Faire venir le plus de monde possible en magasin pour découvrir le "Menu Lucky Deal" à 4,90€.</p>
                    <p><strong>Actions :</strong> Campagne audio d'un mois en mars. Utilisation de la géo-localisation pour diffuser le message aux personnes proches des restaurants.</p>
                    <p><strong>Présence annuelle :</strong> Diffusion de messages réguliers pour les Cookies, les nouvelles recettes et les coupons sur l'application.</p>
                    <p><strong>Budget :</strong> 280 000 € pour l'année.</p>
                    <p><strong>Analyse :</strong> Mesure concrète du nombre de personnes s'étant déplacées en magasin après avoir entendu la publicité.</p>
                `,
                enriched: {
                    persona: `
                        <p class="font-bold">*Le profil type :</p>
                        <p class="italic">"Le jeune de la génération Z qui apprécie les promotions"</p>
                        <p class="mt-4 font-bold">*Portrait de l'auditeur :</p>
                        <p>Étudiant ou jeune actif très attentif à son budget. Il utilise beaucoup les applications mobiles pour trouver des bons plans et écoute du streaming audio toute la journée.</p>
                    `,
                    stats: `
                        <ul class="list-disc pl-4 space-y-4">
                            <li>Plus de 80% des 18-34 ans choisissent où manger en fonction des réductions disponibles (Source : Kantar).</li>
                            <li>Entendre une publicité qui indique le restaurant le plus proche augmente les visites de +35% (Données Audion).</li>
                        </ul>
                    `,
                    yaml: `
Analyse_des_signaux.yaml
Thématique: "Vie quotidienne & Bons plans"
Sujets favoris sur les réseaux :
  - "astuces pour économiser"
  - "idées repas pas chers"
  - "sorties entre amis"
Ce qui le fait réagir :
  - Un prix très bas (moins de 5€)
  - Une offre facile d'accès (sur mobile)
  - La proximité immédiate du restaurant
#Exclusions.yaml
  - Restaurants_gastronomiques
  - Produits_exclusivement_bio_chers
                    `
                }
            },
            {
                id: 'apple',
                brand: 'APPLE',
                original: `
                    <p><strong>Marque :</strong> Apple</p>
                    <p><strong>Campagne :</strong> Valeurs de la marque en Europe.</p>
                    <p><strong>Thèmes :</strong> Vie privée, écologie, outils pour tous et accessibilité.</p>
                    <p><strong>Objectif :</strong> Prendre la parole lors des journées mondiales (Terre, Accessibilité) avec des contenus informatifs et utiles.</p>
                    <p><strong>Dates :</strong> Du 16 avril au 28 mai.</p>
                    <p><strong>Format :</strong> Partenariats avec des podcasts et publicité digitale exclusive.</p>
                `,
                enriched: {
                    persona: `
                        <p class="font-bold">*Le profil type :</p>
                        <p class="italic">"Le fan de tech qui veut du sens"</p>
                        <p class="mt-4 font-bold">*Portrait de l'auditeur :</p>
                        <p>Utilisateur urbain qui aime les beaux produits mais qui est de plus en plus attentif à l'éthique des entreprises et au respect de sa vie privée.</p>
                    `,
                    stats: `
                        <ul class="list-disc pl-4 space-y-4">
                            <li>La protection des données est le premier critère de confiance pour 78% des Français (Source : Deloitte).</li>
                            <li>Un message lu par un podcaster de confiance capte 2 fois plus l'attention de l'auditeur (Lumen Research).</li>
                        </ul>
                    `,
                    yaml: `
Engagement_et_Confiance.yaml
Thématique: "Technologie responsable"
Sujets favoris :
  - "respect de la vie privée"
  - "matériel réparable et durable"
  - "technologie pour tous"
Moments d'écoute :
  - Podcasts d'information
  - Interviews d'experts
  - Contenus sur l'innovation utile
#Exclusions.yaml
  - Sites_de_rumeurs_non_fiables
  - Contenus_violents
                    `
                }
            },
            {
                id: 'chanel',
                brand: 'CHANEL',
                original: `
                    <p><strong>Marque :</strong> Chanel</p>
                    <p><strong>Besoin :</strong> Trouver les meilleures places en publicité audio pour l'univers du luxe.</p>
                    <p><strong>Cible :</strong> Clients très aisés, acheteurs de parfums et de produits de beauté haut de gamme.</p>
                    <p><strong>Exigences :</strong> Être la seule marque de son domaine présente et passer en premier dans les podcasts.</p>
                    <p><strong>Sécurité :</strong> Apparaître uniquement dans des podcasts de grande qualité qui respectent l'image de marque.</p>
                `,
                enriched: {
                    persona: `
                        <p class="font-bold">*Le profil type :</p>
                        <p class="italic">"L'amateur de produits d'exception"</p>
                        <p class="mt-4 font-bold">*Portrait de l'auditeur :</p>
                        <p>Client fidèle aux grandes maisons. Il apprécie l'art, les voyages et la culture. Il recherche des contenus audio calmes et raffinés.</p>
                    `,
                    stats: `
                        <ul class="list-disc pl-4 space-y-4">
                            <li>L'exclusivité publicitaire augmente l'attachement à la marque de +46% dans le luxe (Source : IPSOS).</li>
                            <li>Ces clients écoutent principalement des podcasts sur l'histoire de l'art et les voyages (Données Audion).</li>
                        </ul>
                    `,
                    yaml: `
Univers_Haut_de_Gamme.yaml
Thématique: "Élégance et Savoir-faire"
Sujets favoris :
  - "haute couture"
  - "beauté et soins"
  - "destinations de rêve"
Ambiance recherchée :
  - Pas de coupure publicitaire brutale
  - Musique apaisante (Classique/Jazz)
  - Ton de voix posé et expert
#Exclusions.yaml
  - Podcasts_grand_public_bruyants
  - Sites_de_promotions_masse
                    `
                }
            },
            {
                id: 'linkedin',
                brand: 'LINKEDIN',
                original: `
                    <p><strong>Marque :</strong> LinkedIn</p>
                    <p><strong>Cible :</strong> Directeurs et Responsables des Ressources Humaines (RH).</p>
                    <p><strong>Message :</strong> Faire découvrir les solutions de LinkedIn pour aider les entreprises à recruter les bons talents.</p>
                    <p><strong>Format :</strong> Messages lus par les animateurs de podcasts spécialisés dans le monde du travail.</p>
                    <p><strong>Période :</strong> Début d'année 2025.</p>
                    <p><strong>Analyse :</strong> Étude de l'impact sur l'image de marque auprès des professionnels.</p>
                `,
                enriched: {
                    persona: `
                        <p class="font-bold">*Le profil type :</p>
                        <p class="italic">"Le manager RH en veille"</p>
                        <p class="mt-4 font-bold">*Portrait de l'auditeur :</p>
                        <p>Professionnel avec de grandes responsabilités. Il utilise ses temps de trajet pour s'informer sur les nouvelles façons de travailler et de recruter.</p>
                    `,
                    stats: `
                        <ul class="list-disc pl-4 space-y-4">
                            <li>60% des cadres RH utilisent les podcasts pour apprendre de nouvelles méthodes (Source : GWI).</li>
                            <li>Entendre un conseil d'expert rend le message 3 fois plus convaincant pour un pro (Données LinkedIn).</li>
                        </ul>
                    `,
                    yaml: `
Ciblage_Professionnel.yaml
Thématique: "Emploi et Management"
Sujets favoris :
  - "recrutement efficace"
  - "bien-être des salariés"
  - "outils digitaux pour les RH"
Habitudes d'écoute :
  - Pendant les trajets domicile-travail
  - Podcasts de développement pro
  - Actualité du monde de l'entreprise
#Exclusions.yaml
  - Divertissement_grand_public
  - Profils_stagiaires_uniquement
                    `
                }
            },
            {
                id: 'huttopia',
                brand: 'HUTTOPIA',
                original: `
                    <p><strong>Marque :</strong> Huttopia</p>
                    <p><strong>Objectif :</strong> Faire connaître les campings nature auprès des familles pour les weekends et vacances.</p>
                    <p><strong>Cible :</strong> Parents de jeunes enfants qui veulent se déconnecter du quotidien.</p>
                    <p><strong>Lieux :</strong> France et Pays-Bas.</p>
                    <p><strong>Moment :</strong> Printemps et début d'été pour déclencher les réservations avant les vacances.</p>
                    <p><strong>Format :</strong> Publicité dans des podcasts de voyage et de récits d'aventure.</p>
                `,
                enriched: {
                    persona: `
                        <p class="font-bold">*Le profil type :</p>
                        <p class="italic">"La famille qui veut du grand air"</p>
                        <p class="mt-4 font-bold">*Portrait de l'auditeur :</p>
                        <p>Parents citadins qui cherchent à s'évader. Ils veulent des vacances simples, écologiques et sans écrans pour se retrouver en famille.</p>
                    `,
                    stats: `
                        <ul class="list-disc pl-4 space-y-4">
                            <li>3 familles sur 4 en ville prévoient des vacances en pleine nature cette année (Source : Médiamétrie).</li>
                            <li>Ajouter des sons de forêt ou d'oiseaux augmente l'envie de réserver de +22% (Données Audion).</li>
                        </ul>
                    `,
                    yaml: `
Vacances_Nature_Famille.yaml
Thématique: "Évasion et Outdoor"
Sujets favoris :
  - "campings insolites"
  - "activités pour enfants"
  - "sorties nature"
Ce qui les attire :
  - Les hébergements en bois
  - L'absence de bruit et de pollution
  - Le tourisme local et respectueux
#Exclusions.yaml
  - Clubs_vacances_bruyants
  - Hôtels_de_ville_standard
                    `
                }
            }
        ];

        let activeIdx = 0;

        function updateUI() {
            const data = briefs[activeIdx];
            
            // Injection du Brief Original
            document.getElementById('original-brief').innerHTML = data.original;

            // Injection du Brief Enrichi
            document.getElementById('persona-left').innerHTML = data.enriched.persona;
            document.getElementById('persona-right').innerHTML = data.enriched.stats;
            document.getElementById('yaml-content').innerHTML = `<pre class="whitespace-pre-wrap">${data.enriched.yaml}</pre>`;

            // Rendu des Onglets
            renderTabs();
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            briefs.forEach((b, idx) => {
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 border border-white/20 rounded-lg uppercase text-[10px] font-bold tracking-widest transition-all duration-300 ${idx === activeIdx ? 'tab-active' : 'bg-white/5 hover:bg-white/10'}`;
                btn.textContent = b.brand;
                btn.onclick = () => {
                    activeIdx = idx;
                    updateUI();
                };
                container.appendChild(btn);
            });
        }

        // Initialisation au chargement
        window.onload = updateUI;
    </script>
</body>
</html>
