                        <!-- Cards injected via JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

                    { id: '3', title: "Listening Context", icon: "headphones", color: "amber", analysis: "Drivers are most captive and contextually aligned while they are actively driving.", proposal: "Target via CarPlay/Android Auto during daily commutes, using local tags to indicate the nearest dealership.", visual: { type: 'timeline', active: [7,8,9, 17,18,19] } },

            vgrf: {

                    { id: '2', title: "Engagement Behavior", icon: "shopping-cart", color: "emerald", analysis: "Car maintenance is a utility, much like buying gas. The decision is purely rational, based on trusted expertise, location, and transparent pricing.", proposal: "Personalize the audio message dynamically to highlight specific regional promotional offers or guaranteed service prices.", visual: { type: 'scale', labelLeft: 'Rational', labelRight: 'Emotional', val: 10 } },

                    { id: '5', title: "Audience Maturity", icon: "target", color: "rose", analysis: "Car servicing at a dealership is a completely mainstream, universally understood topic.", proposal: "Focus entirely on loyalty, reliability, and local convenience rather than explaining the service.", visual: { type: 'funnel', stage: 3, label: 'Hot (Mainstream)' } },

        const colorMap = {
            blue: { border: 'border-blue-500', text: 'text-blue-600', bg: 'bg-blue-50/50', fill: 'bg-blue-500', light: 'bg-blue-100' },
            emerald: { border: 'border-emerald-500', text: 'text-emerald-600', bg: 'bg-emerald-50/50', fill: 'bg-emerald-500', light: 'bg-emerald-100' },
            amber: { border: 'border-amber-500', text: 'text-amber-600', bg: 'bg-amber-50/50', fill: 'bg-amber-500', light: 'bg-amber-100' },
            purple: { border: 'border-purple-500', text: 'text-purple-600', bg: 'bg-purple-50/50', fill: 'bg-purple-500', light: 'bg-purple-100' },
            rose: { border: 'border-rose-500', text: 'text-rose-600', bg: 'bg-rose-50/50', fill: 'bg-rose-500', light: 'bg-rose-100' },

        let activeTab = 'qonto'; 

        function setActiveTab(key) {
            activeTab = key;
            renderApp();

        // --- Visual Element Generators ---
        function renderVisualElement(visual, colors) {
            if (!visual) return '';

            switch (visual.type) {
                case 'persona':
                    return `
                        <div class="mb-4 flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full ${colors.fill} text-white flex items-center justify-center flex-shrink-0 shadow-md">
                                <i data-lucide="user" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-0.5">Primary Persona</p>
                                <p class="text-sm font-semibold text-gray-900 tracking-tight">${visual.label}</p>
                            </div>
                        </div>`;
                case 'demographics':
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>${visual.label1} (${visual.val1}%)</span>
                                <span>${visual.label2} (${visual.val2}%)</span>
                            </div>
                            <div class="flex h-1.5 w-full rounded-full overflow-hidden">
                                <div style="width: ${visual.val1}%" class="${colors.fill}"></div>
                                <div style="width: ${visual.val2}%" class="${colors.light}"></div>
                            </div>
                        </div>`;
                case 'scale':
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>${visual.labelLeft}</span>
                                <span>${visual.labelRight}</span>
                            </div>
                            <div class="relative h-1.5 w-full bg-gray-200 rounded-full">
                                <div class="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full border-2 border-white shadow-sm ${colors.fill}" style="left: calc(${visual.val}% - 6px)"></div>
                            </div>
                        </div>`;
                case 'timeline':
                    let hoursHtml = '';
                    for(let i=0; i<24; i++) {
                        let isActive = visual.active.includes(i);
                        hoursHtml += `<div class="flex-1 h-1.5 ${isActive ? colors.fill : 'bg-gray-200'} ${i===0?'rounded-l-sm':''} ${i===23?'rounded-r-sm':''}"></div>`;
                    }
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>00:00</span><span>Dayparting</span><span>24:00</span>
                            </div>
                            <div class="flex gap-[1px] w-full">${hoursHtml}</div>
                        </div>`;
                case 'tags':
                    let tagsHtml = visual.items.map(t => `
                        <div class="inline-flex items-center gap-1.5 px-3 py-1.5 text-[10px] font-semibold uppercase tracking-widest ${colors.text} bg-white border border-gray-200 rounded-full shadow-sm hover:border-gray-300 transition-colors">
                            <i data-lucide="tag" class="w-3 h-3 opacity-70"></i>
                            ${t}
                        </div>
                    `).join('');
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-2">
                                <span>Detected Affinities</span>
                            </div>
                            <div class="flex flex-wrap gap-2">${tagsHtml}</div>
                        </div>`;
                case 'funnel':
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>Cold</span><span>Warm</span><span>Hot</span>
                            </div>
                            <div class="flex gap-1 w-full h-1.5">
                                <div class="flex-1 rounded-l-full ${visual.stage >= 1 ? colors.fill : 'bg-gray-200'}"></div>
                                <div class="flex-1 ${visual.stage >= 2 ? colors.fill : 'bg-gray-200'}"></div>
                                <div class="flex-1 rounded-r-full ${visual.stage >= 3 ? colors.fill : 'bg-gray-200'}"></div>
                            </div>
                            <p class="text-[10px] font-semibold ${colors.text} mt-2 text-center uppercase tracking-widest">${visual.label}</p>
                        </div>`;
                case 'intent':
                    const activeSegments = Math.round((visual.score / 100) * 5);
                    let segmentsHtml = '';
                    for(let i=0; i<5; i++) {
                        const isActive = i < activeSegments;
                        segmentsHtml += `<div class="flex-1 h-1.5 rounded-sm ${isActive ? colors.fill : 'bg-gray-200'}"></div>`;
                    }
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between items-end mb-1.5">
                                <span class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">${visual.label}</span>
                                <span class="text-[12px] font-bold ${colors.text} tracking-tight">${visual.level} (${visual.score}%)</span>
                            </div>
                            <div class="flex gap-1 w-full">
                                ${segmentsHtml}
                            </div>
                            <div class="flex justify-between text-[8px] font-medium text-gray-400 uppercase tracking-widest mt-1">
                                <span>Low</span>
                                <span>Ready to Buy</span>
                            </div>
                        </div>`;
                default:
                    return '';
            }
        }

        function renderApp() {
            const data = briefsData[activeTab];

            // 1. RENDER TABS
            const tabsContainer = document.getElementById('tabs-container');
            let tabsHtml = '';
            for (const key in briefsData) {
                const isActive = key === activeTab;
                const baseClasses = "px-5 py-2 rounded-full text-sm font-medium transition-all whitespace-nowrap border";
                const activeClasses = isActive 
                    ? "bg-[#0A0D14] text-white border-[#0A0D14] shadow-md" 
                    : "bg-white text-gray-500 border-gray-200 hover:border-gray-300 hover:bg-gray-50";
                
                tabsHtml += `<button onclick="setActiveTab('${key}')" class="${baseClasses} ${activeClasses}">${briefsData[key].name}</button>`;
            }
            tabsContainer.innerHTML = tabsHtml;

            // 2. RENDER TOP FULL WIDTH BLOCK (Original Brief)
            document.getElementById('orig-brand').innerText = data.original.brand;
            document.getElementById('orig-target').innerText = data.original.target;
            document.getElementById('orig-budget').innerText = data.original.budget;
            document.getElementById('orig-context').innerText = data.original.context;

            // 3. RENDER ADVANCED MATRIX (6 Criteria Grid)
            const matrixContainer = document.getElementById('criteria-grid');
            let matrixHtml = '';
            
            data.enriched.forEach(crit => {
                const colors = colorMap[crit.color];
                const visualHtml = renderVisualElement(crit.visual, colors);
                
                matrixHtml += `
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 flex flex-col h-full hover:shadow-md transition-shadow">
                    
                    <!-- Criterion Header -->
                    <div class="flex items-center justify-between mb-5 border-b border-gray-100 pb-3">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="text-[10px] font-semibold uppercase tracking-[0.2em]">Criterion 0${crit.id}</span>
                        </div>
                        <i data-lucide="${crit.icon}" class="w-4 h-4 text-gray-300"></i>
                    </div>
                    
                    <h3 class="text-lg font-semibold text-gray-900 mb-5 tracking-tight">${crit.title}</h3>

                    <!-- Injected Visual Element -->
                    ${visualHtml}

                    <div class="flex flex-col gap-4 flex-1 mt-2">
                        <!-- Observation Block -->
                        <div class="flex-1 relative">
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Observation</p>
                            <p class="text-[13px] text-gray-600 leading-relaxed">${crit.analysis}</p>
                        </div>

                        <!-- AI Proposal Block -->
                        <div class="rounded-lg bg-gray-50 border border-gray-100 p-4 flex-1 relative overflow-hidden">
                            <div class="absolute left-0 top-0 bottom-0 w-[3px] ${colors.fill}"></div>
                            <p class="text-[10px] font-semibold ${colors.text} uppercase tracking-widest mb-1.5 flex items-center gap-1.5 ml-1">
                                <i data-lucide="sparkles" class="w-3 h-3"></i> Activation Advice
                            </p>
                            <p class="text-[13px] font-medium text-gray-900 leading-relaxed ml-1">${crit.proposal}</p>
                        </div>
                    </div>
                </div>
                `;
            });

            matrixContainer.innerHTML = matrixHtml;
            lucide.createIcons();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
