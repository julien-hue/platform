<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audion AI Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-white border-r border-gray-100 flex flex-col p-6 shadow-sm">
        
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 flex items-center justify-center">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-8 h-8">
                    <path d="M12 3L4 12l8 9 8-9-8-9zM12 8l4 4-4 4-4-4 4-4z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Audion AI</h1>
        </div>

        <nav class="space-y-1">
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-gray-50 text-gray-900 rounded-lg font-medium transition-colors">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                Dashboard
            </a>

            <div class="relative mt-6 mb-4">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" placeholder="Search..." class="w-full pl-10 pr-12 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-100">
                <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1 px-1.5 py-0.5 border border-gray-200 rounded text-[10px] text-gray-400 font-medium">
                    <span>⌘</span><span>K</span>
                </div>
            </div>

            <div class="pt-4 pb-2">
                <span class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Agents</span>
            </div>

            <div class="space-y-1">
                <a href="#" class="flex items-center justify-between px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <div class="flex items-center gap-3">
                        <i data-lucide="database" class="w-5 h-5"></i>
                        <span>Indexation</span>
                    </div>
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                </a>

                <a href="#" class="flex items-center justify-between px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <div class="flex items-center gap-3">
                        <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                        <span>Qualification</span>
                    </div>
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                </a>

                <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="maximize" class="w-5 h-5"></i>
                    <span>Competition Analysis</span>
                </a>

                <a href="#" class="flex items-center justify-between px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <div class="flex items-center gap-3">
                        <i data-lucide="music" class="w-5 h-5"></i>
                        <span>Creation</span>
                    </div>
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                </a>

                <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                    <span>Performance</span>
                </a>
            </div>
        </nav>

        <div class="mt-auto border-t border-gray-100 pt-6">
            <button class="flex items-center justify-between w-full group">
                <div class="flex items-center gap-3">
                    <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=48&h=48&q=80" 
                         alt="User profile" 
                         class="w-10 h-10 rounded-full object-cover">
                    <div class="text-left">
                        <p class="text-sm font-semibold text-gray-900">Julien Rialan</p>
                        <p class="text-xs text-gray-500">julien@audion.fm</p>
                    </div>
                </div>
                <i data-lucide="chevron-up" class="w-5 h-5 text-gray-400"></i>
            </button>
        </div>

    </aside>

    <script>
      lucide.createIcons();
    </script>
</body>
</html>
