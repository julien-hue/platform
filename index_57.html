                    target: 'Youth (18-25) & Career Changers', 
                    budget: '€34k net', 
                    period: 'Oct 12 to Nov 1',
                    context: "« On va travailler le TF4 et le TF5 comme une seule et même campagne. Objectif: Recrutement de nouveaux marins. Cible reconversion : 22-30 ans, avec une première expérience pro (hébergement, restauration, commerce, BTP). En recherche de stabilité, de sens, d’évolution. Contrainte : diffusion au sein de la WL GAE (inchangée depuis 2022). »"
                },
                enriched: [
                    { id: '1', title: "Household Profile", icon: "users", color: "blue", analysis: "Young adults (18-30) often living with parents or seeking independence. Many have technical backgrounds (construction, hospitality) looking for stability.", proposal: "Direct geographic targeting towards industrial employment basins and large university areas to reach career changers.", visual: { type: 'persona', label: 'The Career Changer' } },
                    { id: '2', title: "Engagement Behavior", icon: "shopping-cart", color: "emerald", analysis: "Joining the military is a life-altering, deeply emotional decision involving identity, purpose, and adventure, albeit with rational benefits (paid training).", proposal: "Use highly emotional, immersive storytelling to evoke pride and adventure. Reassure rationally on career progression to convince their parents.", visual: { type: 'scale', labelLeft: 'Rational', labelRight: 'Emotional', val: 80 } },
                    { id: '3', title: "Listening Context", icon: "headphones", color: "amber", analysis: "This demographic heavily over-consumes audio on mobile devices, particularly late in the day and at night.", proposal: "Broadcast exclusively short, punchy formats (15s) weighted towards evening and late-night mobile sessions.", visual: { type: 'timeline', active: [18,19,20,21,22,23] } },
                    { id: '4', title: "Values & Affinities", icon: "heart", color: "purple", analysis: "Driven by action, team spirit, and adrenaline, with strong cultural ties to gaming and urban scenes.", proposal: "Align media placements with Rap/Electro playlists and 'Action/Gaming' podcast segments.", visual: { type: 'tags', items: ['Gaming', 'Action', 'Urban Music', 'Purpose'] } },
                    { id: '5', title: "Audience Maturity", icon: "target", color: "rose", analysis: "While the Navy is known, modern military careers are misunderstood. The audience requires education to overcome stereotypes.", proposal: "Treat as a COLD audience. Break preconceived notions using modern, dynamic 3D audio experiences.", visual: { type: 'funnel', stage: 1, label: 'Cold (Education)' } },
                    { id: '6', title: "Intent Signals", icon: "zap", color: "indigo", analysis: "Targeting individuals actively feeling professional frustration or seeking new career paths.", proposal: "Retarget visitors of career guidance platforms, job boards, or temp agency websites.", visual: { type: 'intent', score: 75, label: 'Commitment Intent', level: 'High' } }
                ],
                guidelines: {
                    creative: {
                        voice: "Jeune, intense, motivante (Format court 15s/20s)",
                        message: "Trouvez votre vraie place. Dépassez-vous.",
                        script: [
                            { time: "0:00 - 0:05", label: "The Disruption", sfx: "Ambiance bruyante de restaurant ou de chantier, souffle lourd. Interruption nette (Cut).", vo: "Tu tournes en rond ? Tu cherches une carrière qui a vraiment du sens ?" },
                            { time: "0:05 - 0:15", label: "The Action", sfx: "Immersion 3D (Audio Spatial). Bruit de vagues fortes, hélicoptère qui passe au-dessus, musique électro épique.", vo: "Change de cap. La Marine Nationale recrute et forme dans plus de 50 métiers, même avec ton expérience." },
                            { time: "0:15 - 0:20", label: "The Institutional CTA", sfx: "Signature musicale Marine.", vo: "Prends les commandes de ta vie. Rejoins l'équipage sur lamarinerecrute.fr." }
                        ]
                    },
                    content: {
                        networks: ["Gaming & e-Sport", "Urban Culture", "True Stories"],
                        podcasts: [
                            { name: "Code Source", author: "Le Parisien", img: "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=100&h=100&fit=crop" },
                            { name: "Hondelatte Raconte", author: "Europe 1", img: "https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=100&h=100&fit=crop" },
                            { name: "Popcorn", author: "Domingo", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=100&h=100&fit=crop" },
                            { name: "Urban Action", author: "Street Culture", img: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=100&h=100&fit=crop" }
                        ],
                        streaming: [
                            { icon: "gamepad-2", text: "<strong>Gaming:</strong> Playlists in-game, Twitch Audio ads" },
                            { icon: "music", text: "<strong>Urban/Electro:</strong> Rap FR, French Touch, Workout playlists" },
                            { icon: "moon", text: "<strong>Late Night:</strong> Sur-pression sur la tranche 21h-01h" }
                        ],
                        brandSafety: "Diffusion strictly constrained within the pre-approved Whitelist (WL GAE). Exclude any political, overly controversial, or non-patriotic content."
                    }
                }
            }
        };

        const colorMap = {
            blue: { border: 'border-blue-500', text: 'text-blue-600', bg: 'bg-blue-50/50', fill: 'bg-blue-500', light: 'bg-blue-100' },
            emerald: { border: 'border-emerald-500', text: 'text-emerald-600', bg: 'bg-emerald-50/50', fill: 'bg-emerald-500', light: 'bg-emerald-100' },
            amber: { border: 'border-amber-500', text: 'text-amber-600', bg: 'bg-amber-50/50', fill: 'bg-amber-500', light: 'bg-amber-100' },
            purple: { border: 'border-purple-500', text: 'text-purple-600', bg: 'bg-purple-50/50', fill: 'bg-purple-500', light: 'bg-purple-100' },
            rose: { border: 'border-rose-500', text: 'text-rose-600', bg: 'bg-rose-50/50', fill: 'bg-rose-500', light: 'bg-rose-100' },
            indigo: { border: 'border-indigo-500', text: 'text-indigo-600', bg: 'bg-indigo-50/50', fill: 'bg-indigo-500', light: 'bg-indigo-100' }
        };

        let activeTab = 'qonto'; 

        function setActiveTab(key) {
            activeTab = key;
            renderApp();
        }

        // --- Visual Element Generators ---
        function renderVisualElement(visual, colors) {
            if (!visual) return '';

            switch (visual.type) {
                case 'persona':
                    return `
                        <div class="mb-4 flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full ${colors.fill} text-white flex items-center justify-center flex-shrink-0 shadow-md">
                                <i data-lucide="user" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-0.5">Primary Persona</p>
                                <p class="text-sm font-semibold text-gray-900 tracking-tight">${visual.label}</p>
                            </div>
                        </div>`;
                case 'demographics':
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>${visual.label1} (${visual.val1}%)</span>
                                <span>${visual.label2} (${visual.val2}%)</span>
                            </div>
                            <div class="flex h-1.5 w-full rounded-full overflow-hidden">
                                <div style="width: ${visual.val1}%" class="${colors.fill}"></div>
                                <div style="width: ${visual.val2}%" class="${colors.light}"></div>
                            </div>
                        </div>`;
                case 'scale':
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>${visual.labelLeft}</span>
                                <span>${visual.labelRight}</span>
                            </div>
                            <div class="relative h-1.5 w-full bg-gray-200 rounded-full">
                                <div class="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full border-2 border-white shadow-sm ${colors.fill}" style="left: calc(${visual.val}% - 6px)"></div>
                            </div>
                        </div>`;
                case 'timeline':
                    let hoursHtml = '';
                    for(let i=0; i<24; i++) {
                        let isActive = visual.active.includes(i);
                        hoursHtml += `<div class="flex-1 h-1.5 ${isActive ? colors.fill : 'bg-gray-200'} ${i===0?'rounded-l-sm':''} ${i===23?'rounded-r-sm':''}"></div>`;
                    }
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>00:00</span><span>Dayparting</span><span>24:00</span>
                            </div>
                            <div class="flex gap-[1px] w-full">${hoursHtml}</div>
                        </div>`;
                case 'tags':
                    let tagsHtml = visual.items.map(t => `
                        <div class="inline-flex items-center gap-1.5 px-3 py-1.5 text-[10px] font-semibold uppercase tracking-widest ${colors.text} bg-white border border-gray-200 rounded-full shadow-sm hover:border-gray-300 transition-colors">
                            <i data-lucide="tag" class="w-3 h-3 opacity-70"></i>
                            ${t}
                        </div>
                    `).join('');
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-2">
                                <span>Detected Affinities</span>
                            </div>
                            <div class="flex flex-wrap gap-2">${tagsHtml}</div>
                        </div>`;
                case 'funnel':
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between text-[10px] font-semibold text-gray-500 uppercase tracking-widest mb-1.5">
                                <span>Cold</span><span>Warm</span><span>Hot</span>
                            </div>
                            <div class="flex gap-1 w-full h-1.5">
                                <div class="flex-1 rounded-l-full ${visual.stage >= 1 ? colors.fill : 'bg-gray-200'}"></div>
                                <div class="flex-1 ${visual.stage >= 2 ? colors.fill : 'bg-gray-200'}"></div>
                                <div class="flex-1 rounded-r-full ${visual.stage >= 3 ? colors.fill : 'bg-gray-200'}"></div>
                            </div>
                            <p class="text-[10px] font-semibold ${colors.text} mt-2 text-center uppercase tracking-widest">${visual.label}</p>
                        </div>`;
                case 'intent':
                    const activeSegments = Math.round((visual.score / 100) * 5);
                    let segmentsHtml = '';
                    for(let i=0; i<5; i++) {
                        const isActive = i < activeSegments;
                        segmentsHtml += `<div class="flex-1 h-1.5 rounded-sm ${isActive ? colors.fill : 'bg-gray-200'}"></div>`;
                    }
                    return `
                        <div class="mb-4">
                            <div class="flex justify-between items-end mb-1.5">
                                <span class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">${visual.label}</span>
                                <span class="text-[12px] font-bold ${colors.text} tracking-tight">${visual.level} (${visual.score}%)</span>
                            </div>
                            <div class="flex gap-1 w-full">
                                ${segmentsHtml}
                            </div>
                            <div class="flex justify-between text-[8px] font-medium text-gray-400 uppercase tracking-widest mt-1">
                                <span>Low</span>
                                <span>Ready to Buy</span>
                            </div>
                        </div>`;
                default:
                    return '';
            }
        }

        function renderApp() {
            const data = briefsData[activeTab];

            // 1. RENDER TABS
            const tabsContainer = document.getElementById('tabs-container');
            let tabsHtml = '';
            for (const key in briefsData) {
                const isActive = key === activeTab;
                const baseClasses = "px-5 py-2 rounded-full text-sm font-medium transition-all whitespace-nowrap border";
                const activeClasses = isActive 
                    ? "bg-[#0A0D14] text-white border-[#0A0D14] shadow-md" 
                    : "bg-white text-gray-500 border-gray-200 hover:border-gray-300 hover:bg-gray-50";
                
                tabsHtml += `<button onclick="setActiveTab('${key}')" class="${baseClasses} ${activeClasses}">${briefsData[key].name}</button>`;
            }
            tabsContainer.innerHTML = tabsHtml;

            // 2. RENDER TOP FULL WIDTH BLOCK (Original Brief)
            document.getElementById('orig-brand').innerText = data.original.brand;
            document.getElementById('orig-target').innerText = data.original.target;
            document.getElementById('orig-budget').innerText = data.original.budget;
            document.getElementById('orig-context').innerText = data.original.context;

            // 3. RENDER ADVANCED MATRIX (6 Criteria Grid)
            const matrixContainer = document.getElementById('criteria-grid');
            let matrixHtml = '';
            
            data.enriched.forEach(crit => {
                const colors = colorMap[crit.color];
                const visualHtml = renderVisualElement(crit.visual, colors);
                
                matrixHtml += `
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 flex flex-col h-full hover:shadow-md transition-shadow">
                    
                    <!-- Criterion Header -->
                    <div class="flex items-center justify-between mb-5 border-b border-gray-100 pb-3">
                        <div class="flex items-center gap-2 text-gray-400">
                            <span class="text-[10px] font-semibold uppercase tracking-[0.2em]">Criterion 0${crit.id}</span>
                        </div>
                        <i data-lucide="${crit.icon}" class="w-4 h-4 text-gray-300"></i>
                    </div>
                    
                    <h3 class="text-lg font-semibold text-gray-900 mb-5 tracking-tight">${crit.title}</h3>

                    <!-- Injected Visual Element -->
                    ${visualHtml}

                    <div class="flex flex-col gap-4 flex-1 mt-2">
                        <!-- Observation Block -->
                        <div class="flex-1 relative">
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1.5">Observation</p>
                            <p class="text-[13px] text-gray-600 leading-relaxed">${crit.analysis}</p>
                        </div>

                        <!-- AI Proposal Block -->
                        <div class="rounded-lg bg-gray-50 border border-gray-100 p-4 flex-1 relative overflow-hidden mt-auto">
                            <div class="absolute left-0 top-0 bottom-0 w-[3px] ${colors.fill}"></div>
                            <p class="text-[10px] font-semibold ${colors.text} uppercase tracking-widest mb-1.5 flex items-center gap-1.5 ml-1">
                                <i data-lucide="sparkles" class="w-3 h-3"></i> Activation Advice
                            </p>
                            <p class="text-[13px] font-medium text-gray-900 leading-relaxed ml-1">${crit.proposal}</p>
                        </div>
                    </div>
                </div>
                `;
            });

            matrixContainer.innerHTML = matrixHtml;
            
            // 4. RENDER DYNAMIC GUIDELINES & CONTENT SELECTION
            const guidelinesContainer = document.getElementById('guidelines-container');
            const gData = data.guidelines;

            let scriptHtml = gData.creative.script.map((step, index) => {
                const isLast = index === gData.creative.script.length - 1;
                const dotColor = isLast ? 'bg-pink-500' : 'bg-pink-400';
                return `
                <div class="relative">
                    <div class="absolute -left-[21px] top-1 w-2.5 h-2.5 ${dotColor} rounded-full ring-4 ring-white"></div>
                    <div class="text-[10px] font-bold ${isLast ? 'text-pink-700' : 'text-pink-600'} uppercase tracking-wider mb-1.5">${step.time} • ${step.label}</div>
                    <div class="${isLast ? 'bg-pink-50/50 border-pink-100' : 'bg-gray-50 border-gray-100'} p-3 rounded-lg border">
                        <p class="text-[11px] ${isLast ? 'text-pink-600' : 'text-gray-500'} font-mono mb-2 flex flex-wrap items-center gap-1.5 leading-snug">
                            <span class="${isLast ? 'bg-pink-200 text-pink-700' : 'bg-gray-200 text-gray-600'} px-1.5 py-0.5 rounded text-[9px] font-sans font-bold tracking-wide">SFX</span>
                            ${step.sfx}
                        </p>
                        <p class="text-[13px] ${isLast ? 'text-gray-900' : 'text-gray-800'} leading-relaxed font-medium">
                            <strong class="text-pink-600 text-xs mr-1 font-bold">VO:</strong> 
                            "${step.vo}"
                        </p>
                    </div>
                </div>`;
            }).join('');

            let podcastsHtml = gData.content.podcasts.map(pod => `
                <div class="flex items-center gap-3 bg-gray-50 p-2.5 rounded-lg border border-gray-100 hover:border-blue-200 hover:bg-blue-50/50 transition-colors cursor-pointer">
                    <img src="${pod.img}" alt="${pod.name}" class="w-10 h-10 rounded shadow-sm object-cover shrink-0" />
                    <div class="min-w-0">
                        <p class="text-xs font-bold text-gray-900 truncate">${pod.name}</p>
                        <p class="text-[10px] text-gray-500 truncate mt-0.5">${pod.author}</p>
                    </div>
                </div>
            `).join('');

            let streamingHtml = gData.content.streaming.map(stream => `
                <div class="flex items-center gap-3">
                    <i data-lucide="${stream.icon}" class="w-4 h-4 text-gray-400 shrink-0"></i> 
                    <span class="text-[13px]">${stream.text}</span>
                </div>
            `).join('');

            let networksHtml = gData.content.networks.map(net => `
                <span class="px-2.5 py-1 rounded-full text-[10px] font-semibold uppercase tracking-widest bg-gray-100 text-gray-600 border border-gray-200">${net}</span>
            `).join('');

            guidelinesContainer.innerHTML = `
                <!-- Creative Guidelines Box -->
                <div class="bg-white rounded-xl border border-gray-200 border-t-4 border-t-pink-500 shadow-sm p-6 flex flex-col hover:shadow-md transition-shadow">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-lg bg-pink-100 text-pink-600 flex items-center justify-center shrink-0">
                            <i data-lucide="volume-2" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-gray-900 tracking-tight">Creative Guidelines</h2>
                            <p class="text-xs text-gray-500 uppercase tracking-wide mt-0.5">Script Scenario</p>
                        </div>
                    </div>
                    
                    <div class="space-y-4 flex-grow flex flex-col">
                        <div class="flex flex-wrap gap-3 mb-2">
                            <div class="bg-gray-50 px-3 py-2 rounded-lg border border-gray-100 flex-1 min-w-[140px]">
                                <h4 class="text-[10px] font-bold text-gray-500 uppercase">Voice Profile</h4>
                                <p class="text-xs text-gray-900 font-medium mt-1">${gData.creative.voice}</p>
                            </div>
                            <div class="bg-gray-50 px-3 py-2 rounded-lg border border-gray-100 flex-1 min-w-[140px]">
                                <h4 class="text-[10px] font-bold text-gray-500 uppercase">Core Message</h4>
                                <p class="text-xs text-gray-900 font-medium mt-1">${gData.creative.message}</p>
                            </div>
                        </div>

                        <!-- Script Timeline -->
                        <div class="relative border-l-2 border-pink-100 ml-2 pl-4 py-1 space-y-4 flex-grow mt-2">
                            ${scriptHtml}
                        </div>
                    </div>
                </div>

                <!-- Content Selection Box -->
                <div class="bg-white rounded-xl border border-gray-200 border-t-4 border-t-blue-500 shadow-sm p-6 flex flex-col hover:shadow-md transition-shadow">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center shrink-0">
                            <i data-lucide="radio" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-gray-900 tracking-tight">Content Selection</h2>
                            <p class="text-xs text-gray-500 uppercase tracking-wide mt-0.5">Target Inventory & Context</p>
                        </div>
                    </div>

                    <div class="space-y-5 flex-grow">
                        <div>
                            <h3 class="text-sm font-semibold text-gray-900 mb-3">Premium Networks & Categories</h3>
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${networksHtml}
                            </div>
                            
                            <!-- Podcast Artworks Grid -->
                            <div class="grid grid-cols-2 gap-3 mt-3">
                                ${podcastsHtml}
                            </div>
                        </div>
                        
                        <div class="h-px w-full bg-gray-100"></div>
                        
                        <div>
                            <h3 class="text-sm font-semibold text-gray-900 mb-3">Audio & Music Contexts</h3>
                            <div class="grid grid-cols-1 gap-2.5 text-sm text-gray-700">
                                ${streamingHtml}
                            </div>
                        </div>

                        <div class="h-px w-full bg-gray-100"></div>

                        <div class="flex items-start gap-3 bg-blue-50 p-3.5 rounded-lg border border-blue-100">
                            <i data-lucide="shield-check" class="w-4 h-4 text-blue-600 mt-0.5 shrink-0"></i>
                            <p class="text-xs text-blue-900 leading-relaxed">
                                <strong>Brand Safety:</strong> ${gData.content.brandSafety}
                            </p>
                        </div>
                    </div>
                </div>
            `;

            // Re-initialize Lucide icons for the newly injected HTML
            lucide.createIcons();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
